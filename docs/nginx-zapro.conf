# Nginx reverse proxy for Zapro production deployment.
# Place this in /etc/nginx/sites-available/ and symlink to sites-enabled.
# Run: certbot --nginx -d zapro.yourdomain.com -d admin.zapro.yourdomain.com -d api.zapro.yourdomain.com -d proxy.zapro.yourdomain.com

# Web app (main UI)
server {
    listen 443 ssl http2;
    server_name zapro.yourdomain.com;

    # SSL certs (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/zapro.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zapro.yourdomain.com/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin panel
server {
    listen 443 ssl http2;
    server_name admin.zapro.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/zapro.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zapro.yourdomain.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Backend API + GraphQL + WebSocket
server {
    listen 443 ssl http2;
    server_name api.zapro.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/zapro.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zapro.yourdomain.com/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3170;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for GraphQL subscriptions
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

# Proxyscotch (CORS proxy)
server {
    listen 443 ssl http2;
    server_name proxy.zapro.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/zapro.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zapro.yourdomain.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:9159;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name zapro.yourdomain.com admin.zapro.yourdomain.com api.zapro.yourdomain.com proxy.zapro.yourdomain.com;
    return 301 https://$host$request_uri;
}
