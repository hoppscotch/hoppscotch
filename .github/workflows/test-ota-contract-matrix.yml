name: 'Test: Ota contract matrix'

on:
  workflow_dispatch:
    inputs:
      ota_repository:
        description: Ota source repository to build for this matrix run
        required: false
        default: ota-run/ota
      ota_ref:
        description: Ota branch, tag, or commit to build for this matrix run
        required: false
        default: main
  pull_request:
    paths:
      - 'ota.yaml'
      - '.github/workflows/test-ota-contract-matrix.yml'
  push:
    paths:
      - 'ota.yaml'
      - '.github/workflows/test-ota-contract-matrix.yml'

concurrency:
  group: ota-contract-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  OTA_NO_UPDATE_CHECK: '1'

jobs:
  native:
    name: Ota Contract Matrix (Cross-OS + Ubuntu Runtime - ${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-bash
            os: ubuntu-latest
            docker_ready: true
            full_proof: true
          - name: macos-bash
            os: macos-latest
            docker_ready: false
            full_proof: false
          - name: windows-bash
            os: windows-latest
            docker_ready: false
            full_proof: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm via corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate
          pnpm --version

      - name: Install ota from source
        uses: ota-run/ota/.github/actions/install-ota-from-source@v1.6.18
        with:
          repository: ${{ github.event.inputs.ota_repository || 'ota-run/ota' }}
          ref: ${{ github.event.inputs.ota_ref || 'main' }}

      - name: Validate contract
        shell: bash
        run: |
          ota validate --json . > ota-validate.json
          ota validate .

      - name: List verify workflow tasks
        shell: bash
        run: ota tasks --workflow verify .

      - name: List verify:container workflow tasks
        shell: bash
        run: ota tasks --workflow verify:container .

      - name: List selfhost workflow tasks
        shell: bash
        run: ota tasks --workflow selfhost .

      - name: List app workflow tasks
        shell: bash
        run: ota tasks --workflow app .

      - name: List backend workflow tasks
        shell: bash
        run: ota tasks --workflow backend .

      - name: List admin workflow tasks
        shell: bash
        run: ota tasks --workflow admin .

      - name: Export execution topology
        shell: bash
        run: |
          ota execution topology --json . > ota-execution-topology.json
          cat ota-execution-topology.json

      - name: Dry-run verify workflow
        shell: bash
        run: ota up --workflow verify --native --dry-run .

      - name: Dry-run verify workflow (container mode, cross-OS)
        shell: bash
        run: |
          set +e
          ota up --workflow verify --container --dry-run --json . > ota-up-verify-container-dry-run.json
          verify_container_status=$?
          ota up --workflow verify:container --container --dry-run --json . > ota-up-verify-container-workflow-dry-run.json
          verify_container_workflow_status=$?
          set -e
          grep -q '"dry_run"' ota-up-verify-container-dry-run.json
          grep -q '"status"' ota-up-verify-container-dry-run.json
          grep -q '"dry_run"' ota-up-verify-container-workflow-dry-run.json
          grep -q '"status"' ota-up-verify-container-workflow-dry-run.json
          if [ "$verify_container_status" -ne 0 ] || [ "$verify_container_workflow_status" -ne 0 ]; then
            echo "container dry-run blocked on this host (expected on non-Ubuntu hosted runners)"
          fi

      - name: Dry-run selfhost workflow
        if: ${{ matrix.docker_ready }}
        shell: bash
        run: ota up --workflow selfhost --native --dry-run .

      - name: Dry-run app workflow
        if: ${{ matrix.docker_ready }}
        shell: bash
        run: ota up --workflow app --native --dry-run .

      - name: Dry-run backend workflow
        if: ${{ matrix.docker_ready }}
        shell: bash
        run: ota up --workflow backend --native --dry-run .

      - name: Dry-run admin workflow
        if: ${{ matrix.docker_ready }}
        shell: bash
        run: ota up --workflow admin --native --dry-run .

      - name: Execute native smoke tasks (cross-OS non-Ubuntu)
        if: ${{ !matrix.full_proof }}
        timeout-minutes: 45
        shell: bash
        run: |
          ota run lint --native --stream .
          ota run typecheck --native --stream .

      - name: Execute verify workflow (native)
        if: ${{ matrix.full_proof }}
        timeout-minutes: 45
        shell: bash
        run: ota up --workflow verify --native --stream .

      - name: Execute verify workflow (container)
        if: ${{ matrix.full_proof }}
        timeout-minutes: 45
        shell: bash
        run: ota up --workflow verify:container --container --stream .

      - name: Dry-run all non-internal tasks (native coverage lane)
        if: ${{ matrix.full_proof }}
        timeout-minutes: 120
        shell: bash
        run: |
          set -euo pipefail
          ota tasks --json . > ota-tasks-all.json
          jq -c '
            .tasks[]
            | select((.internal // false) == false)
            | {
                name: .name,
                supports_native: (
                  if (.modes | type) == "array" then
                    any(.modes[]?; .mode == "native")
                  else
                    ((.default_mode // "native") == "native")
                  end
                ),
                runtime_native: (
                  if (.modes | type) == "array" then
                    any(.modes[]?; .mode == "native" and ((.has_runtime // false) == true))
                  else
                    false
                  end
                )
              }
            | select(.supports_native)
          ' ota-tasks-all.json > ota-non-internal-native.jsonl
          while IFS= read -r task_line; do
            task_name="$(jq -r '.name' <<<"$task_line")"
            runtime_native="$(jq -r '.runtime_native' <<<"$task_line")"
            echo ">>> [native] ${task_name} (runtime=${runtime_native})"
            if [ "$runtime_native" = "true" ]; then
              ota run --native --dry-run --json "$task_name" .
            else
              ota run --native --dry-run --json "$task_name" .
            fi
          done < ota-non-internal-native.jsonl

      - name: Dry-run all non-internal tasks (container coverage lane)
        if: ${{ matrix.full_proof }}
        timeout-minutes: 120
        shell: bash
        run: |
          set -euo pipefail
          ota tasks --json . > ota-tasks-all.json
          jq -c '
            .tasks[]
            | select((.internal // false) == false)
            | {
                name: .name,
                supports_container: (
                  if (.modes | type) == "array" then
                    any(.modes[]?; .mode == "container")
                  else
                    ((.default_mode // "native") == "container")
                  end
                ),
                runtime_container: (
                  if (.modes | type) == "array" then
                    any(.modes[]?; .mode == "container" and ((.has_runtime // false) == true))
                  else
                    false
                  end
                )
              }
            | select(.supports_container)
          ' ota-tasks-all.json > ota-non-internal-container.jsonl
          while IFS= read -r task_line; do
            task_name="$(jq -r '.name' <<<"$task_line")"
            runtime_container="$(jq -r '.runtime_container' <<<"$task_line")"
            echo ">>> [container] ${task_name} (runtime=${runtime_container})"
            if [ "$runtime_container" = "true" ]; then
              ota run --container --dry-run --json "$task_name" .
            else
              ota run --container --dry-run --json "$task_name" .
            fi
          done < ota-non-internal-container.jsonl

      - name: Proof selfhost workflow
        if: ${{ matrix.full_proof }}
        timeout-minutes: 120
        shell: bash
        run: |
          ota clean . || true
          set +e
          ota proof runtime --workflow selfhost --json . > ota-proof-selfhost.json
          status=$?
          cat ota-proof-selfhost.json
          if [ "$status" -eq 0 ]; then
            ota clean . || true
          fi
          exit "$status"

      - name: Upload failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: ota-contract-matrix-${{ matrix.name }}
          include-hidden-files: true
          path: |
            ota-validate.json
            ota-execution-topology.json
            ota-up-verify-container-dry-run.json
            ota-up-verify-container-workflow-dry-run.json
            ota-proof-selfhost.json
            .ota/proof/selfhost/
